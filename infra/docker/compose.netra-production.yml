name: netra-production

x-production-env: &production-env
  environment:
    DJANGO_DEBUG: "0"
    DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?DJANGO_SECRET_KEY is required}
    DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:?DJANGO_ALLOWED_HOSTS is required}
    DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-}
    DJANGO_SECURE_PROXY_SSL_HEADER: ${DJANGO_SECURE_PROXY_SSL_HEADER:-0}
    DJANGO_SECURE_HSTS_SECONDS: ${DJANGO_SECURE_HSTS_SECONDS:-0}
    DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
    DATABASE_CONN_MAX_AGE: ${DATABASE_CONN_MAX_AGE:-0}
    SUPABASE_PROJECT_REF: ${SUPABASE_PROJECT_REF:?SUPABASE_PROJECT_REF is required}
    SUPABASE_URL: ${SUPABASE_URL:?SUPABASE_URL is required}
    SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:?SUPABASE_ANON_KEY is required}
    SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:?SUPABASE_SERVICE_ROLE_KEY is required}
    NETRA_DATABASE_PROVIDER: supabase
    NETRA_DATABASE_MODE: supabase
    NETRA_STORAGE_PROVIDER: supabase
    NETRA_QUEUE_PROVIDER: supabase-pgmq
    NETRA_REALTIME_PROVIDER: supabase
    NETRA_AUTH_PROVIDER: supabase
    NETRA_ACCESS_MODE: supabase-auth
    NETRA_DEV_ROLE_HEADERS: "0"
    NETRA_SEARCH_PROVIDER: postgres
    NETRA_PROCESSING_MODE: ${NETRA_SUPABASE_PROCESSING_MODE:-hybrid}
    NETRA_SUPABASE_START_WORKERS: ${NETRA_SUPABASE_START_WORKERS:-1}
    NETRA_SYNC_FALLBACK_ENABLED: "1"
    NETRA_STORAGE_ROOT: /app/storage
    NETRA_EVIDENCE_ENCRYPTION: "on"
    NETRA_EVIDENCE_KEY: ${NETRA_EVIDENCE_KEY:?NETRA_EVIDENCE_KEY is required}
    NETRA_EVIDENCE_KEY_ID: ${NETRA_EVIDENCE_KEY_ID:?NETRA_EVIDENCE_KEY_ID is required}
    NETRA_SENSOR_SHARED_KEY: ${NETRA_SENSOR_SHARED_KEY:?NETRA_SENSOR_SHARED_KEY is required}
    NETRA_WEBHOOK_SIGNING_SECRET: ${NETRA_WEBHOOK_SIGNING_SECRET:?NETRA_WEBHOOK_SIGNING_SECRET is required}
    NETRA_MAX_UPLOAD_MB: ${NETRA_MAX_UPLOAD_MB:-1024}
    NETRA_WORKER_MAX_RETRIES: ${NETRA_WORKER_MAX_RETRIES:-3}
    NETRA_FRONTEND_ORIGINS: ${NETRA_FRONTEND_ORIGINS:?NETRA_FRONTEND_ORIGINS is required}
    NETRA_DEPLOYMENT_ENV: production
    NETRA_PUBLIC_BASE_URL: ${NETRA_PUBLIC_BASE_URL:?NETRA_PUBLIC_BASE_URL is required}
    NETRA_REQUIRE_HTTPS: ${NETRA_REQUIRE_HTTPS:-0}
    NETRA_RELEASE_ID: ${NETRA_RELEASE_ID:-manual-production}

x-worker-service: &worker-service
  image: netra-production-backend:latest
  build:
    context: ../..
    dockerfile: backend/Dockerfile
  <<: *production-env
  volumes:
    - netra-production-storage:/app/storage
  depends_on:
    - backend
  restart: unless-stopped
  profiles:
    - workers

services:
  frontend:
    image: netra-production-frontend:latest
    build:
      context: ../../frontend
      dockerfile: Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:?VITE_SUPABASE_URL is required}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:?VITE_SUPABASE_ANON_KEY is required}
        VITE_SUPABASE_REALTIME_ENABLED: ${VITE_SUPABASE_REALTIME_ENABLED:-1}
    ports:
      - "${NETRA_HTTP_BIND:-0.0.0.0}:8080:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    image: netra-production-backend:latest
    build:
      context: ../..
      dockerfile: backend/Dockerfile
    <<: *production-env
    command: sh -c "python manage.py migrate --run-syncdb && (python manage.py bootstrap_supabase || echo 'Supabase bootstrap failed; continuing so the API can start. Check Supabase keys/buckets.') && gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers ${NETRA_GUNICORN_WORKERS:-2} --timeout ${NETRA_GUNICORN_TIMEOUT:-240}"
    expose:
      - "8000"
    volumes:
      - netra-production-storage:/app/storage
    restart: unless-stopped

  capture-worker:
    <<: *worker-service
    command: python manage.py run_netra_worker capture

  pcap-ingestion-worker:
    <<: *worker-service
    command: python manage.py run_netra_worker pcap-ingestion

  parser-worker:
    <<: *worker-service
    command: python manage.py run_netra_worker parser

  decoder-worker:
    <<: *worker-service
    command: python manage.py run_netra_worker decoder

  session-worker:
    <<: *worker-service
    command: python manage.py run_netra_worker session

  detection-worker:
    <<: *worker-service
    command: python manage.py run_netra_worker detection

  anomaly-worker:
    <<: *worker-service
    command: python manage.py run_netra_worker anomaly

  analysis-finalizer-worker:
    <<: *worker-service
    command: python manage.py run_netra_worker analysis-finalizer

  report-export-worker:
    <<: *worker-service
    command: python manage.py run_netra_worker report-export

  scheduler-worker:
    <<: *worker-service
    command: python manage.py run_netra_scheduler

  retention-worker:
    <<: *worker-service
    command: python manage.py run_netra_retention

volumes:
  netra-production-storage:
