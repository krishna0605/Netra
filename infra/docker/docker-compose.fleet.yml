name: netra

x-fleet-worker-env: &fleet-worker-env
  DJANGO_DEBUG: "1"
  DJANGO_SECRET_KEY: netra-development-only-secret-phase3-long-enough-for-jwt
  POSTGRES_DB: netra
  POSTGRES_USER: netra
  POSTGRES_PASSWORD: netra
  POSTGRES_HOST: host.docker.internal
  POSTGRES_PORT: "${NETRA_LOCAL_POSTGRES_PORT:-5432}"
  NETRA_DATABASE_MODE: local-postgres
  NETRA_STORAGE_ROOT: /app/storage
  NETRA_KAFKA_BOOTSTRAP: kafka:9092
  NETRA_ELASTICSEARCH_URL: http://elasticsearch:9200
  NETRA_PROCESSING_MODE: async-primary
  NETRA_SYNC_FALLBACK_ENABLED: "1"
  NETRA_ACCESS_MODE: trusted-lan
  NETRA_DEV_ROLE_HEADERS: "0"
  NETRA_TRUSTED_LAN_ACTOR: "Local Investigator"
  NETRA_TRUSTED_LAN_ROLE: "LAN Operator"
  NETRA_SENSOR_SHARED_KEY: "${NETRA_SENSOR_SHARED_KEY:-netra-phase5-local-sensor-key}"
  NETRA_EVIDENCE_ENCRYPTION: "on"
  NETRA_EVIDENCE_KEY: netra-phase3-development-evidence-key
  NETRA_EVIDENCE_KEY_ID: dev-key-001
  NETRA_MAX_UPLOAD_MB: "1024"
  NETRA_WORKER_MAX_RETRIES: "3"

services:
  backend:
    environment:
      NETRA_PROCESSING_MODE: async-primary
      NETRA_SYNC_FALLBACK_ENABLED: "1"
      NETRA_MAX_UPLOAD_MB: "1024"

  capture-worker:
    environment:
      NETRA_PROCESSING_MODE: async-primary

  parser-worker:
    environment:
      NETRA_PROCESSING_MODE: async-primary

  decoder-worker:
    environment:
      NETRA_PROCESSING_MODE: async-primary

  session-worker:
    environment:
      NETRA_PROCESSING_MODE: async-primary

  detection-worker:
    environment:
      NETRA_PROCESSING_MODE: async-primary

  anomaly-worker:
    environment:
      NETRA_PROCESSING_MODE: async-primary

  report-export-worker:
    environment:
      NETRA_PROCESSING_MODE: async-primary

  pcap-ingestion-worker:
    build:
      context: ../..
      dockerfile: backend/Dockerfile
    command: python manage.py run_netra_worker pcap-ingestion
    environment: *fleet-worker-env
    volumes:
      - netra-storage:/app/storage
    depends_on:
      - backend
    restart: unless-stopped

  analysis-finalizer-worker:
    build:
      context: ../..
      dockerfile: backend/Dockerfile
    command: python manage.py run_netra_worker analysis-finalizer
    environment: *fleet-worker-env
    volumes:
      - netra-storage:/app/storage
    depends_on:
      - backend
    restart: unless-stopped

  scheduler-worker:
    build:
      context: ../..
      dockerfile: backend/Dockerfile
    command: python manage.py run_netra_scheduler
    environment: *fleet-worker-env
    volumes:
      - netra-storage:/app/storage
    depends_on:
      - backend
    restart: unless-stopped

  retention-worker:
    build:
      context: ../..
      dockerfile: backend/Dockerfile
    command: python manage.py run_netra_retention
    environment: *fleet-worker-env
    volumes:
      - netra-storage:/app/storage
    depends_on:
      - backend
    restart: unless-stopped
